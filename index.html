<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>臺灣心理資源地圖</title>

  <!-- Leaflet 地圖樣式 -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  >

  <!-- MarkerCluster -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"
  >

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"
  >

  <!-- 自己的網頁樣式 -->
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header class="site-header">
  <div class="header-left-section">
    <div class="header-title-group">
      <h1>臺灣心理資源地圖</h1>

      <p class="header-subtitle">
        城鄉環境與心理資源空間分析
      </p>
    </div>

    <div
      class="header-location-search"
      role="search"
      aria-label="行政區檢索"
    >
      <label class="location-search-field">
        <span>縣市</span>

        <select
          id="county-search-select"
          disabled
        >
          <option value="">
            資料載入中
          </option>
        </select>
      </label>

      <label class="location-search-field">
        <span>鄉鎮市區</span>

        <select
          id="town-search-select"
          disabled
        >
          <option value="">
            請先選擇縣市
          </option>
        </select>
      </label>

      <button
        type="button"
        id="location-search-reset"
        class="location-search-reset"
        title="回到全臺範圍"
      >
        全臺
      </button>
    </div>
  </div>
</header>

  <div id="map"></div>

  <!-- Leaflet 地圖程式 -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  ></script>

<!-- MarkerCluster -->
<script
  src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"
></script>

  <!-- 自己的地圖程式 -->
  <script src="map.js"></script>
</body>
</html>
